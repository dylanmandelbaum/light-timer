<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

    <title>Light Timer</title>

    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">

    <meta name="theme-color" content="#000000">
</head>

<body>

<!-- HOME SCREEN -->
<div id="homeScreen">

    <h1>Light Timer V7.1</h1>

    <p>Choose a pattern</p>

    <select id="patternSelect"></select>

    <button id="startButton">Start</button>

</div>


<!-- RUN SCREEN -->
<div id="runScreen">

    <!-- TOTAL TIMER (pattern countdown) -->
    <div id="patternTimerDisplay">0</div>

    <!-- PROFILE DOTS (THIS IS YOUR NEW SYSTEM) -->
    <div id="profileBar"></div>

    <!-- CURRENT STEP TIMER -->
    <div id="timerDisplay">0</div>

    <!-- CIRCLE AREA -->
    <div id="circleWrap">

        <div id="outerCircle">
            <div id="circle"></div>
        </div>

        <button id="stopButton">■</button>
        <button id="pauseButton">❚❚</button>

    </div>

</div>

<script src="profiles.js"></script>
<script src="patterns.js"></script>
<script src="app.js"></script>

</body>
</html>
